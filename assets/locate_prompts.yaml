# Locate Anything Prompt Library for Accident Scene Analysis
# Optimized for UAV/Drone top-down perspectives

prompts:
  person_injured:
    description: "Person lying motionless on the ground or road"
    prompt: "person lying flat or motionless on the ground, road, or asphalt"
    category: "person"
    caption: "injured, lying down"
  
  person_running:
    description: "Person in a dynamic running posture away from vehicles"
    prompt: "person running, sprinting, or moving fast away from the vehicles"
    category: "person"
    caption: "running"
  
  person_helping:
    description: "Two or more people clustered tightly, crouching over someone"
    prompt: "person crouching, kneeling, or leaning over another person on the ground"
    category: "person"
    caption: "assisting"
  
  crashed_car:
    description: "Car with physical deformation, crushed roof, or overturned"
    prompt: "car with severe structural deformation, smashed windows, or flipped upside down"
    category: "car"
    caption: "crashed"
  
  emergency_vehicle:
    description: "Ambulance, fire truck, or police car with emergency lights"
    prompt: "ambulance, fire engine, or police car with roof emergency lights"
    category: "emergency_vehicle"
    caption: "emergency responder"
  
  hazardous_debris:
    description: "Car parts, shattered glass, or fluid spills on the road"
    prompt: "scattered car parts, heavy debris, or dark fluid spill on the road surface"
    category: "obstacle"
    caption: "debris/spill"

metadata:
  version: "1.1"
  created_at: "2026-06-16"
  dataset: "CrashVista (UAV accident scenes)"