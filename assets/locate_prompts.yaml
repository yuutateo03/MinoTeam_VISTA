# Locate Anything Prompt Library for Accident Scene Analysis

prompts:
  person_injured:
    description: "Person sitting or lying down, appears injured after crash"
    prompt: "person sitting or lying down after a crash, appears injured or distressed"
    category: "person"
    caption: "injured, sitting"
  
  person_running:
    description: "Person moving quickly or running away from accident"
    prompt: "person running or walking quickly away from the accident scene"
    category: "person"
    caption: "running"
  
  person_helping:
    description: "Person assisting another person at accident scene"
    prompt: "person helping another person, assisting or caring for someone"
    category: "person"
    caption: "helping"
  
  crashed_car:
    description: "Car with visible damage, collision, or overturned"
    prompt: "car with visible damage, collision marks, or overturned position"
    category: "car"
    caption: "crashed"
  
  emergency_vehicle:
    description: "Ambulance, fire truck, police car, or tow truck responding"
    prompt: "ambulance, fire truck, police car, or emergency vehicle responding to accident"
    category: "emergency_vehicle"
    caption: "emergency vehicle"
  
  normal_car:
    description: "Car present but not involved in or damaged by accident"
    prompt: "car present but not damaged or involved in the accident"
    category: "car"
    caption: null

metadata:
  version: "1.0"
  created_at: "2026-06-14"
  dataset: "CrashVista (UAV accident scenes)"