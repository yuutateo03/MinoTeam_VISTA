# Configuration for pipeline grid search and tuning evaluation

tuning:
  # YOLO parameter search space
  yolo:
    model: "yolo26x_visdrone.pt"
    conf: [0.01, 0.05, 0.1, 0.25]               # Base confidence thresholds
    iou: [0.3, 0.45, 0.6]                       # Non-Maximum Suppression IoU limits

  # Locate Anything selective grounding search space
  locate_anything:
    conf_threshold: [0.25, 0.35, 0.45]          # VLM confidence filters
    every_n_frames: [3, 5, 10, 15]              # Temporal sampling rates
    iou_merge_threshold: [0.3, 0.45, 0.6]       # Spatial fusion NMS thresholds

evaluation:
  # Reference structures expected from your tracking loop
  schemas:
    predictions_mot:
      - "video_id"
      - "frame_id"
      - "track_id"
      - "x1"
      - "y1"
      - "x2"
      - "y2"
      - "conf"
      - "category"
    predictions_tracks:
      - "video_id"
      - "track_id"
      - "frame_start"
      - "frame_end"
      - "caption"

  # Target performance and accuracy baselines
  targets:
    min_hybrid_fps: 5.0                         # Strict real-time drone processing constraint
    min_f1_score: 0.75                          # Minimum grounding quality baseline